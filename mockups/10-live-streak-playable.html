<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Streak — Live (playable)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#07090d; --accent:#FF6A1A; --accent-2:#FFB23E; --green:#3DE08A; --red:#FF3B3B;
    --text:#F4F6FA; --text-2:#9AA2B1; --text-3:#5C6473;
    --card:#11141b; --card-2:#181d27; --card-3:#1c222d;
    --b:rgba(255,255,255,.06); --b2:rgba(255,255,255,.09);
  }
  *{box-sizing:border-box;margin:0;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;}
  body{background:radial-gradient(130% 90% at 50% -10%,#1a1410,#0b0907 45%,#050608);min-height:100vh;
    display:flex;align-items:center;justify-content:center;padding:20px;font-family:'Inter',system-ui,sans-serif;color:var(--text);}
  .phone{position:relative;width:400px;min-height:860px;background:linear-gradient(180deg,#0c0a08,#080a0e);
    border:1px solid var(--b2);border-radius:42px;padding:18px 15px 20px;overflow:hidden;box-shadow:0 40px 120px rgba(0,0,0,.6);}
  .phone::before{content:"";position:absolute;top:-90px;left:50%;transform:translateX(-50%);width:460px;height:300px;
    background:var(--accent);opacity:.2;filter:blur(80px);border-radius:50%;pointer-events:none;}
  .phone>*{position:relative;z-index:1;}
  .tnum{font-variant-numeric:tabular-nums;}

  .top{display:flex;align-items:center;justify-content:space-between;}
  .brand{font-family:'Archivo';font-weight:800;font-size:22px;letter-spacing:-1px;}
  .brand b{color:var(--accent);}
  .ctrls{display:flex;gap:6px;align-items:center;}
  .cbtn{background:var(--card-3);border:1px solid var(--b2);color:var(--text);border-radius:9px;padding:6px 9px;
    font-size:11px;font-weight:700;cursor:pointer;font-family:'JetBrains Mono';}
  .cbtn.on{border-color:var(--accent);color:var(--accent-2);}

  .match{display:flex;align-items:center;justify-content:space-between;margin-top:12px;
    background:linear-gradient(180deg,#151921,#0d1017);border:1px solid var(--b2);border-radius:16px;padding:11px 14px;}
  .side{display:flex;align-items:center;gap:8px;width:118px;}
  .side.away{justify-content:flex-end;}
  .crest{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-family:'Archivo';font-weight:800;font-size:10px;color:#fff;box-shadow:0 0 0 1px rgba(255,255,255,.15);}
  .cn{font-family:'Archivo';font-weight:700;font-size:12.5px;}
  .mid{text-align:center;}
  .sc{font-family:'Archivo';font-weight:800;font-size:26px;letter-spacing:1px;line-height:1;}
  .min{font-family:'JetBrains Mono';font-size:10.5px;margin-top:3px;font-weight:600;color:var(--red);display:inline-flex;align-items:center;gap:5px;}
  .blip{width:6px;height:6px;border-radius:50%;background:var(--red);animation:blip 1.3s infinite;}
  .min.paused{color:var(--text-3);}
  .min.paused .blip{animation:none;background:var(--text-3);}
  @keyframes blip{0%,100%{opacity:1;}50%{opacity:.3;}}

  /* stat strip */
  .stats{display:flex;gap:0;margin-top:8px;background:rgba(0,0,0,.25);border-radius:11px;padding:8px 4px;}
  .st{flex:1;text-align:center;}
  .st+.st{border-left:1px solid var(--b);}
  .st .v{font-family:'Archivo';font-weight:700;font-size:13px;}
  .st .k{font-size:8.5px;color:var(--text-3);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}

  /* streak hero */
  .hero{text-align:center;margin-top:12px;}
  .flame{font-size:34px;line-height:1;filter:drop-shadow(0 4px 16px rgba(255,106,26,.5));display:inline-block;}
  .flame.hot{animation:flick 1.2s ease-in-out infinite;}
  @keyframes flick{0%,100%{transform:scale(1) rotate(-2deg);}50%{transform:scale(1.12) rotate(2deg);}}
  .snum{font-family:'Archivo';font-weight:800;font-size:58px;line-height:.9;letter-spacing:-3px;margin-top:2px;
    background:linear-gradient(180deg,#FFE2B0,#FF6A1A);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .snum.pop{animation:pop .4s ease;}
  @keyframes pop{0%{transform:scale(1);}40%{transform:scale(1.25);}100%{transform:scale(1);}}
  .slab{font-size:10.5px;letter-spacing:2.5px;color:var(--accent-2);text-transform:uppercase;font-weight:700;}
  .meta{display:flex;justify-content:center;gap:7px;margin-top:10px;font-size:11px;color:var(--text-2);flex-wrap:wrap;}
  .meta .chip{background:var(--card);border:1px solid var(--b2);padding:5px 10px;border-radius:999px;}
  .meta .chip b{color:var(--text);}
  .meta .chip.prize b{color:var(--accent-2);font-family:'Archivo';}

  .run{display:flex;align-items:center;justify-content:center;gap:5px;margin-top:12px;min-height:22px;}
  .rc{width:20px;height:20px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;}
  .rc.hit{background:var(--green);color:#07120d;}
  .rc.miss{background:rgba(255,59,59,.18);color:var(--red);border:1px solid rgba(255,59,59,.4);}
  .rc.skip{background:var(--card-3);color:var(--text-3);}

  /* the call */
  .call{position:relative;margin-top:13px;background:linear-gradient(180deg,#1a130b,#0d0b08);
    border:1.5px solid rgba(255,106,26,.4);border-radius:18px;padding:15px 14px 14px;overflow:hidden;box-shadow:0 0 30px rgba(255,106,26,.13);}
  .call.win{border-color:rgba(61,224,138,.6);box-shadow:0 0 34px rgba(61,224,138,.2);}
  .call.lose{border-color:rgba(255,59,59,.55);box-shadow:0 0 30px rgba(255,59,59,.16);}
  .call .lab{display:flex;align-items:center;justify-content:space-between;font-size:10px;letter-spacing:1.3px;
    color:var(--accent-2);font-weight:800;text-transform:uppercase;}
  .call .timer{font-family:'JetBrains Mono';color:var(--text);font-weight:600;letter-spacing:0;}
  .call .q{font-family:'Archivo';font-weight:800;font-size:18px;margin-top:8px;line-height:1.15;}
  .bar{height:5px;border-radius:999px;background:var(--card-3);overflow:hidden;margin-top:10px;}
  .bar-f{height:100%;background:linear-gradient(90deg,#FF6A1A,#FFB23E);width:100%;}
  .opts{display:flex;gap:7px;margin-top:12px;}
  .opt{flex:1;background:var(--card-2);border:1px solid var(--b2);border-radius:12px;padding:11px 5px;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:5px;color:var(--text);transition:.1s;}
  .opt:active{transform:translateY(1px);}
  .opt .oc{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-family:'Archivo';font-weight:800;font-size:9px;color:#fff;}
  .opt .ot{font-size:12px;font-weight:700;}
  .opt .os{font-size:9px;color:var(--text-3);}
  .opt.sel{border-color:var(--accent);background:rgba(255,106,26,.14);}
  .opt.correct{border-color:var(--green);background:rgba(61,224,138,.15);}
  .opt.wrong{border-color:var(--red);opacity:.6;}
  .call.done .opt{cursor:default;}
  .verdict{margin-top:11px;text-align:center;font-size:13px;font-weight:800;min-height:18px;}
  .verdict.win{color:var(--green);}
  .verdict.lose{color:var(--red);}
  .verdict.skip{color:var(--text-3);}

  /* feed */
  .sec{font-size:10.5px;text-transform:uppercase;letter-spacing:.7px;color:var(--text-2);font-weight:700;margin:14px 4px 6px;}
  .feed{background:var(--card);border:1px solid var(--b);border-radius:13px;padding:6px 12px;max-height:118px;overflow:hidden;}
  .fe{display:flex;gap:8px;padding:6px 0;font-size:12px;border-top:1px solid var(--b);align-items:center;}
  .fe:first-child{border-top:0;}
  .fe .fm{font-family:'JetBrains Mono';font-size:10.5px;color:var(--text-3);width:26px;}
  .fe.goal{color:var(--accent-2);font-weight:700;}

  /* leaderboard */
  .lb{background:var(--card);border:1px solid var(--b);border-radius:13px;padding:4px 12px;}
  .lbr{display:flex;align-items:center;gap:9px;padding:7px 0;font-size:12.5px;border-top:1px solid var(--b);}
  .lbr:first-child{border-top:0;}
  .lbr .r{width:16px;color:var(--text-3);font-family:'JetBrains Mono';font-size:11px;}
  .lbr .n{flex:1;font-weight:600;}
  .lbr.me{color:var(--accent);}
  .lbr .s{font-weight:800;}

  /* overlay */
  .over{position:absolute;inset:0;z-index:20;background:rgba(6,8,12,.9);backdrop-filter:blur(6px);
    display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px;}
  .over.show{display:flex;}
  .over .ttl{font-family:'Archivo';font-weight:800;font-size:26px;}
  .over .big{font-family:'Archivo';font-weight:800;font-size:56px;color:var(--accent-2);margin:6px 0;}
  .over .sub{color:var(--text-2);font-size:13px;line-height:1.6;}
  .over .btn{margin-top:20px;background:linear-gradient(180deg,#FF9244,#FF6A1A);color:#0a0a0a;border:0;border-radius:13px;
    padding:14px 26px;font-weight:800;font-size:15px;cursor:pointer;}

  .hint{text-align:center;font-size:10.5px;color:var(--text-3);margin-top:12px;}
</style>
</head>
<body>
  <div class="phone">
    <div class="over" id="over">
      <div class="ttl" id="overTtl">Full time</div>
      <div class="big tnum" id="overBig">🔥 8</div>
      <div class="sub" id="overSub"></div>
      <button class="btn" id="again">Next match ▸</button>
    </div>

    <div class="top">
      <div class="brand">Strea<b>k</b></div>
      <div class="ctrls">
        <button class="cbtn" id="pp">⏸</button>
        <button class="cbtn" id="spd">1×</button>
        <button class="cbtn" id="nm">↻</button>
      </div>
    </div>

    <div class="match">
      <div class="side"><span class="crest" id="cH" style="background:#0b6bcb">ENG</span><span class="cn" id="nH">England</span></div>
      <div class="mid"><div class="sc tnum"><span id="scH">0</span>&nbsp;–&nbsp;<span id="scA">0</span></div>
        <div class="min" id="minWrap"><span class="blip"></span><span id="clock">0'</span></div></div>
      <div class="side away"><span class="cn" id="nA">Congo DR</span><span class="crest" id="cA" style="background:#c62b2b">CGO</span></div>
    </div>

    <div class="stats">
      <div class="st"><div class="v tnum" id="stShots">0-0</div><div class="k">Shots</div></div>
      <div class="st"><div class="v tnum" id="stCorners">0-0</div><div class="k">Corners</div></div>
      <div class="st"><div class="v tnum" id="stCards">0-0</div><div class="k">Cards</div></div>
      <div class="st"><div class="v tnum" id="stPoss">50%</div><div class="k">Poss</div></div>
    </div>

    <div class="hero">
      <div class="flame" id="flame">🔥</div>
      <div class="snum tnum" id="streak">0</div>
      <div class="slab">streak</div>
      <div class="meta">
        <span class="chip">best <b class="tnum" id="best">0</b></span>
        <span class="chip">pts <b class="tnum" id="pts">0</b></span>
        <span class="chip prize">🏆 top streak <b>◎312</b></span>
      </div>
    </div>

    <div class="run" id="run"></div>

    <div class="call" id="call">
      <div class="lab"><span id="callKind">⚡ Your call</span><span class="timer" id="timer">0.0s</span></div>
      <div class="q" id="q">—</div>
      <div class="bar"><div class="bar-f" id="barf"></div></div>
      <div class="opts" id="opts"></div>
      <div class="verdict" id="verdict"></div>
    </div>

    <div class="sec">Live feed</div>
    <div class="feed" id="feed"></div>

    <div class="sec">Streaks alive · 1,204 playing</div>
    <div class="lb" id="lb"></div>

    <div class="hint">Tap a call before the timer runs out · get it right to grow your streak</div>
  </div>

<script>
(function(){
  // ── Config ──
  const HOME={code:'ENG',name:'England',color:'#0b6bcb'};
  const AWAY={code:'CGO',name:'Congo DR',color:'#c62b2b'};
  const SPEEDS=[1,2,4]; let spdIdx=0;
  const BASE_MIN_MS=1500;          // real ms per sim-minute at 1×
  const ANSWER_MS=9000;            // real ms to answer a call
  const RESULT_MS=1900;            // real ms to show a verdict
  const FEED_MAX=7;

  // ── State ──
  let M, running=true, simAcc=0, lastTs=0, botAcc=0;
  const g={streak:0,best:0,pts:0,correct:0,attempts:0,hist:[]};
  let bots=[
    {name:'zk_marco',streak:6},{name:'ana.sol',streak:4},
    {name:'pel3',streak:3},{name:'d_ronaldo',streak:2},{name:'mbap',streak:5},
  ];
  let call=null;

  const $=id=>document.getElementById(id);

  function newMatch(){
    M={min:0,scH:0,scA:0,shotsH:0,shotsA:0,cornersH:0,cornersA:0,cardsH:0,cardsA:0,poss:50,feed:[],over:false,htShown:false};
    simAcc=0; call=null;
    $('over').classList.remove('show');
    pushFeed('',`Kick-off — ${HOME.name} v ${AWAY.name}`,false);
    spawnCall();
    render();
  }

  function pushFeed(min,txt,goal){
    M.feed.unshift({min,txt,goal});
    if(M.feed.length>FEED_MAX) M.feed.pop();
  }

  // ── Match sim: advance one sim-minute ──
  function advanceMinute(){
    M.min++;
    const rnd=Math.random;
    // possession random walk
    M.poss=Math.max(32,Math.min(68,M.poss+(rnd()*6-3)));
    // goal
    if(rnd()<0.035){
      if(rnd()<0.55){M.scH++;pushFeed(M.min,`⚽ GOAL — ${HOME.name}! (${M.scH}-${M.scA})`,true);feedEvent('goal','H');}
      else{M.scA++;pushFeed(M.min,`⚽ GOAL — ${AWAY.name}! (${M.scH}-${M.scA})`,true);feedEvent('goal','A');}
    }
    // shots
    if(rnd()<0.34){const h=rnd()<0.52;if(h){M.shotsH++;pushFeed(M.min,`🎯 Shot — ${HOME.name}`,false);feedEvent('shot','H');}else{M.shotsA++;pushFeed(M.min,`🎯 Shot — ${AWAY.name}`,false);feedEvent('shot','A');}}
    // corners
    if(rnd()<0.14){const h=rnd()<0.5;if(h){M.cornersH++;pushFeed(M.min,`⛳ Corner — ${HOME.name}`,false);feedEvent('corner','H');}else{M.cornersA++;pushFeed(M.min,`⛳ Corner — ${AWAY.name}`,false);feedEvent('corner','A');}}
    // cards
    if(rnd()<0.05){const h=rnd()<0.5;if(h){M.cardsH++;pushFeed(M.min,`🟨 Booking — ${HOME.name}`,false);feedEvent('card','H');}else{M.cardsA++;pushFeed(M.min,`🟨 Booking — ${AWAY.name}`,false);feedEvent('card','A');}}

    if(M.min===45&&!M.htShown){M.htShown=true;pushFeed(45,'⏸ Half-time',false);}
    // resolving windows tick on the minute
    if(call&&call.phase==='resolving'){call.elapsed++;const w=call.settle(call.acc,call.elapsed);if(w!==null) grade(w);}
    if(M.min>=90&&!M.over) endMatch();
  }

  // feed an event to an active resolving call's accumulator
  function feedEvent(type,team){
    if(call&&call.phase==='resolving'){call.acc.push({type,team});}
  }

  // ── Calls ──
  function spawnCall(){
    if(M.over) return;
    const gens=[nextGoal,shotsRace,cornerSoon,cardSoon,goalBeforeWin];
    const c=gens[Math.floor(Math.random()*gens.length)]();
    c.phase='answer'; c.ansMs=ANSWER_MS; c.pick=null; c.acc=[]; c.elapsed=0;
    call=c; renderCall();
  }
  function nextGoal(){
    return {kind:'⚡ Next goal',q:'Who scores the next goal?',
      opts:[{k:'H',t:HOME.name,s:'',c:HOME.color,oc:HOME.code},{k:'N',t:'No goal',s:'in ~8 min',c:'#2b3340',oc:'—'},{k:'A',t:AWAY.name,s:'',c:AWAY.color,oc:AWAY.code}],
      win:8, settle:(acc,el)=>{const gl=acc.find(e=>e.type==='goal');if(gl)return gl.team;return el>=8?'N':null;}};
  }
  function shotsRace(){
    return {kind:'📈 Shots race',q:'More shots in the next 5 minutes?',
      opts:[{k:'H',t:HOME.name,s:'',c:HOME.color,oc:HOME.code},{k:'A',t:AWAY.name,s:'',c:AWAY.color,oc:AWAY.code}],
      win:5, settle:(acc,el)=>{if(el<5)return null;const h=acc.filter(e=>e.type==='shot'&&e.team==='H').length;const a=acc.filter(e=>e.type==='shot'&&e.team==='A').length;return h>=a?'H':'A';}};
  }
  function cornerSoon(){
    return {kind:'⛳ Corner watch',q:'A corner in the next 3 minutes?',
      opts:[{k:'Y',t:'Yes',s:'',c:'#2f7d4f',oc:'✓'},{k:'N',t:'No',s:'',c:'#2b3340',oc:'✕'}],
      win:3, settle:(acc,el)=>{if(acc.some(e=>e.type==='corner'))return 'Y';return el>=3?'N':null;}};
  }
  function cardSoon(){
    return {kind:'🟨 Booking watch',q:'A booking in the next 4 minutes?',
      opts:[{k:'Y',t:'Yes',s:'',c:'#8a7d2f',oc:'✓'},{k:'N',t:'No',s:'',c:'#2b3340',oc:'✕'}],
      win:4, settle:(acc,el)=>{if(acc.some(e=>e.type==='card'))return 'Y';return el>=4?'N':null;}};
  }
  function goalBeforeWin(){
    const win=Math.max(3,Math.min(10,90-M.min)); const target=M.min+win;
    return {kind:'🔥 Goal rush',q:`A goal before the ${target}' mark?`,
      opts:[{k:'Y',t:'Yes',s:'goal coming',c:'#2f7d4f',oc:'✓'},{k:'N',t:'No',s:'stays quiet',c:'#2b3340',oc:'✕'}],
      win, settle:(acc,el)=>{if(acc.some(e=>e.type==='goal'))return 'Y';return el>=win?'N':null;}};
  }

  function lock(k){
    if(!call||call.phase!=='answer')return;
    call.pick=k; call.phase='resolving'; call.acc=[]; call.elapsed=0;
    renderCall();
  }
  function grade(winner){
    call.phase='done'; call.winner=winner;
    const won=winner===call.pick;
    g.attempts++;
    if(won){g.correct++;g.streak++;g.pts+=10*g.streak;if(g.streak>g.best)g.best=g.streak;g.hist.push('hit');}
    else{g.streak=0;g.hist.push('miss');}
    if(g.hist.length>9)g.hist.shift();
    renderCall(); render();
    setTimeout(()=>{if(!M.over)spawnCall();}, RESULT_MS);
  }
  function expire(){
    call.phase='done'; call.winner=null; g.hist.push('skip'); if(g.hist.length>9)g.hist.shift();
    renderCall(); render();
    setTimeout(()=>{if(!M.over)spawnCall();}, RESULT_MS-700);
  }

  // ── Loop ──
  function loop(ts){
    const dt=lastTs?ts-lastTs:0; lastTs=ts;
    if(running&&M&&!M.over){
      const minMs=BASE_MIN_MS/SPEEDS[spdIdx];
      simAcc+=dt;
      while(simAcc>=minMs){simAcc-=minMs; advanceMinute(); if(M.over)break;}
      if(call&&call.phase==='answer'){call.ansMs-=dt; if(call.ansMs<=0)expire();}
      botAcc+=dt;
      if(botAcc>=3500){botAcc=0; bots.forEach(b=>{b.streak=Math.random()<0.72?b.streak+1:0;});}
    }
    renderLive();
    requestAnimationFrame(loop);
  }

  // ── Render ──
  function render(){ renderLive(); renderCall(); }
  function renderLive(){
    if(!M)return;
    $('scH').textContent=M.scH; $('scA').textContent=M.scA;
    $('clock').textContent=M.over?"FT":`${M.min}'`;
    $('minWrap').className='min'+((!running||M.over)?' paused':'');
    $('stShots').textContent=`${M.shotsH}-${M.shotsA}`;
    $('stCorners').textContent=`${M.cornersH}-${M.cornersA}`;
    $('stCards').textContent=`${M.cardsH}-${M.cardsA}`;
    $('stPoss').textContent=`${Math.round(M.poss)}%`;
    $('streak').textContent=g.streak; $('best').textContent=g.best; $('pts').textContent=g.pts;
    $('flame').className='flame'+(g.streak>=3?' hot':'');
    // run chips
    $('run').innerHTML=g.hist.map(h=>`<span class="rc ${h}">${h==='hit'?'✓':h==='miss'?'✕':'–'}</span>`).join('')
      + (call&&(call.phase==='answer'||call.phase==='resolving')?`<span class="rc" style="background:transparent;border:1.5px dashed var(--accent);color:var(--accent)">?</span>`:'');
    // feed
    $('feed').innerHTML=M.feed.map(f=>`<div class="fe${f.goal?' goal':''}"><span class="fm">${f.min?f.min+"'":''}</span><span>${f.txt}</span></div>`).join('');
    // leaderboard
    const rows=[...bots.map(b=>({name:b.name,streak:b.streak,me:false})),{name:'you',streak:g.streak,me:true}]
      .sort((a,b)=>b.streak-a.streak).slice(0,5);
    $('lb').innerHTML=rows.map((r,i)=>`<div class="lbr${r.me?' me':''}"><span class="r">${i+1}</span><span class="n">${r.name}</span><span class="s tnum">${r.streak} 🔥</span></div>`).join('');
    // call timer bar
    if(call&&call.phase==='answer'){
      $('timer').textContent=(Math.max(0,call.ansMs)/1000).toFixed(1)+'s';
      $('barf').style.width=Math.max(0,(call.ansMs/ANSWER_MS)*100)+'%';
    }
  }
  function renderCall(){
    if(!call)return;
    const c=call; $('callKind').textContent=c.kind; $('q').textContent=c.q;
    const cardEl=$('call'); cardEl.classList.remove('win','lose','done');
    const answering=c.phase==='answer';
    if(c.phase==='done'){
      cardEl.classList.add('done');
      if(c.winner===null){$('verdict').textContent='⏱ Skipped — no answer';$('verdict').className='verdict skip';$('timer').textContent='';}
      else{const won=c.winner===c.pick;cardEl.classList.add(won?'win':'lose');
        $('verdict').textContent=won?`✓ Nailed it · +1 → streak ${g.streak}`:`✕ Missed · streak reset`;
        $('verdict').className='verdict '+(won?'win':'lose');$('timer').textContent='';$('barf').style.width='0%';}
    } else if(c.phase==='resolving'){
      $('verdict').textContent='● resolving live…';$('verdict').className='verdict skip';$('timer').textContent='locked';$('barf').style.width='0%';
    } else {$('verdict').textContent='';$('verdict').className='verdict';}
    $('opts').innerHTML=c.opts.map(o=>{
      let cls='opt';
      if(c.pick===o.k&&answering)cls+=' sel';
      if(c.phase==='resolving'&&c.pick===o.k)cls+=' sel';
      if(c.phase==='done'&&c.winner){if(o.k===c.winner)cls+=' correct';else if(o.k===c.pick)cls+=' wrong';}
      return `<button class="${cls}" data-k="${o.k}"><span class="oc" style="background:${o.c}">${o.oc}</span><span class="ot">${o.t}</span><span class="os">${o.s||'&nbsp;'}</span></button>`;
    }).join('');
    $('opts').querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>lock(b.dataset.k)));
  }

  function endMatch(){
    M.over=true; call=null;
    $('over').classList.add('show');
    $('overBig').textContent=`🔥 ${g.best}`;
    const rank=[...bots.map(b=>b.streak),g.streak].sort((a,b)=>b-a).indexOf(g.streak)+1;
    $('overSub').innerHTML=`Best streak this match: <b>${g.best}</b><br>${g.correct}/${g.attempts} calls right · ${g.pts} pts<br>You finished <b>#${rank}</b> on the board`;
  }

  // ── Controls ──
  $('pp').addEventListener('click',()=>{running=!running;$('pp').textContent=running?'⏸':'▶';});
  $('spd').addEventListener('click',()=>{spdIdx=(spdIdx+1)%SPEEDS.length;$('spd').textContent=SPEEDS[spdIdx]+'×';});
  $('nm').addEventListener('click',newMatch);
  $('again').addEventListener('click',newMatch);

  // ── Go ──
  $('nH').textContent=HOME.name;$('cH').textContent=HOME.code;$('cH').style.background=HOME.color;
  $('nA').textContent=AWAY.name;$('cA').textContent=AWAY.code;$('cA').style.background=AWAY.color;
  newMatch();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
