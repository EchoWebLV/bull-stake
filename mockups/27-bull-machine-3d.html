<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bull Stake — 3D hand-drawn slot machine (pull the lever)</title>
<!--
  Mockup 27 — the Bull Machine as a CHUNKY hand-drawn arcade cabinet.
  Rebuilds the SOL bulls 3D machine's feel (3 spinning reels, green payline,
  right-side ball lever you pull / Space) in the app's ink-and-paper style,
  with real dimensional depth (stepped extrusion + drawn top/side) instead of
  Three.js — light on mobile, matches the skin. Drag the red ball DOWN, click
  it, or press Space. Self-contained: slot symbols are inline SVG (the real app
  lands the actual 9 bull-trait tiles here).
-->
<style>
  :root{
    --bg:#141019; --cab:#2b2334; --cab-d:#1d1727; --cab-dd:#151019;
    --ink:#f4ecd8; --yellow:#f5e33d; --pink:#e59be0; --red:#e2564d;
    --green:#54d98c; --tan:#cbb986; --gold:#f5c542; --chrome:#b9b7c4;
    --disp:"Marker Felt","Chalkboard SE","Comic Sans MS",system-ui,sans-serif;
    --body:ui-rounded,"SF Pro Rounded","Chalkboard SE",system-ui,-apple-system,sans-serif;
    /* stepped extrusion → solid 3D block, hand-drawn */
    --extrude:
      3px 3px 0 #000, 6px 7px 0 var(--cab-d), 9px 11px 0 var(--cab-d),
      12px 15px 0 var(--cab-dd), 15px 19px 0 var(--cab-dd), 17px 22px 0 #000;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:
      radial-gradient(1100px 620px at 50% -8%, #241a30 0%, transparent 60%),
      var(--bg);
    color:var(--ink);font-family:var(--body);-webkit-font-smoothing:antialiased;
    min-height:100%;display:flex;flex-direction:column;align-items:center;
    padding:22px 16px 40px;gap:16px;overflow-x:hidden}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.5;
    background:radial-gradient(rgba(244,236,216,.05) 1px,transparent 1.5px) 0 0/14px 14px}
  .caps{text-transform:uppercase;letter-spacing:.06em}
  .kick{font-size:12px;font-weight:800;opacity:.6}
  .kick b{color:var(--yellow)}

  /* ── stage holds cabinet + lever together ── */
  .stage{position:relative;margin:6px 30px 10px 4px;z-index:1}

  /* ── the cabinet (chunky extruded block) ── */
  .cab{position:relative;width:320px;border:3px solid var(--ink);border-radius:20px;
    background:linear-gradient(180deg,#312840,#241d30);
    box-shadow:var(--extrude);padding:15px 15px 17px}
  /* drawn top "lip" to sell the 3D crown */
  .cab::before{content:"";position:absolute;left:14px;right:6px;top:-9px;height:10px;
    border:3px solid var(--ink);border-bottom:none;border-radius:12px 12px 0 0;
    background:#3a2f4d;transform:skewX(-24deg);transform-origin:left bottom}

  /* mascot bull cresting the cabinet */
  .crest{position:absolute;top:-58px;left:50%;transform:translateX(-52%);
    width:78px;height:70px;z-index:3;filter:drop-shadow(3px 3px 0 #000)}

  /* marquee */
  .marquee{position:relative;display:flex;align-items:center;justify-content:center;gap:8px;
    border:3px solid var(--ink);border-radius:13px;background:var(--yellow);color:#17130f;
    padding:7px 10px 8px;box-shadow:3px 3px 0 #000;transform:rotate(-1.4deg);margin-bottom:12px}
  .marquee b{font-family:var(--disp);font-size:20px;line-height:1}
  .bulb{width:9px;height:9px;border-radius:50%;background:#fff;border:2px solid #17130f;
    box-shadow:0 0 8px 2px rgba(255,255,255,.7);animation:bulb 1.1s steps(1) infinite}
  .bulb.b2{animation-delay:.55s}
  @keyframes bulb{0%{background:#fff}50%{background:var(--red)}}

  /* ── reel window ── */
  .screen{position:relative;border:3px solid var(--ink);border-radius:13px;overflow:hidden;
    background:#0d0a12;box-shadow:inset 0 0 0 3px #000, inset 0 10px 22px rgba(0,0,0,.8);
    padding:7px}
  .reels{position:relative;display:grid;grid-template-columns:repeat(3,1fr);gap:7px;height:255px}
  .reel-col{position:relative;overflow:hidden;border-radius:9px;background:#181121;
    box-shadow:inset 0 12px 16px -8px #000, inset 0 -12px 16px -8px #000}
  .reel{position:absolute;top:0;left:0;right:0;will-change:transform}
  .reel.blur{filter:blur(1.2px)}
  .cell{height:85px;display:flex;align-items:center;justify-content:center}
  .cell svg{width:54px;height:54px;display:block;filter:drop-shadow(2px 2px 0 rgba(0,0,0,.5))}
  /* green payline across the middle row */
  .payline{position:absolute;left:4px;right:4px;top:50%;height:0;z-index:4;
    border-top:4px solid var(--green);transform:translateY(-2px);
    box-shadow:0 0 12px 2px rgba(84,217,140,.7);opacity:.85}
  .payline::before,.payline::after{content:"";position:absolute;top:-7px;width:0;height:0;
    border:7px solid transparent}
  .payline::before{left:-3px;border-left-color:var(--green)}
  .payline::after{right:-3px;border-right-color:var(--green)}
  .screen.win .payline{animation:pline .28s steps(1) 5}
  @keyframes pline{0%{opacity:1;border-top-color:#fff}50%{opacity:.3}}
  /* glass glare */
  .glare{position:absolute;inset:7px;border-radius:9px;pointer-events:none;
    background:linear-gradient(122deg,rgba(255,255,255,.14),transparent 42%);mix-blend-mode:screen}

  /* ── readout row ── */
  .readout{display:flex;align-items:center;gap:9px;margin-top:12px}
  .jack{flex:1;border:3px solid var(--ink);border-radius:11px;background:#0d0a12;color:var(--gold);
    box-shadow:inset 0 0 0 2px #000;padding:6px 11px;display:flex;align-items:baseline;gap:7px}
  .jack .lab{font-size:9px;font-weight:900;letter-spacing:.12em;opacity:.7;color:var(--ink)}
  .jack b{font-family:var(--disp);font-size:22px;line-height:.9;margin-left:auto;
    text-shadow:0 0 10px rgba(245,197,66,.6)}
  .credits{border:3px solid var(--ink);border-radius:11px;background:var(--pink);color:#17130f;
    box-shadow:3px 3px 0 #000;padding:6px 11px;text-align:center}
  .credits b{font-family:var(--disp);font-size:19px;display:block;line-height:.95}
  .credits span{font-size:8px;font-weight:900;letter-spacing:.1em}

  /* ── coin slot + emblem ── */
  .console{margin-top:11px;border:3px solid var(--ink);border-radius:12px;background:#241d30;
    box-shadow:inset 0 3px 10px rgba(0,0,0,.5);padding:9px 11px;display:flex;align-items:center;gap:10px}
  .coinslot{width:34px;height:34px;border:3px solid var(--ink);border-radius:8px;background:#0d0a12;
    display:flex;align-items:center;justify-content:center;flex:none;box-shadow:inset 0 0 0 2px #000}
  .coinslot::after{content:"";width:15px;height:4px;background:var(--ink);border-radius:2px}
  .emblem{font-family:var(--disp);font-size:15px;line-height:1.05}
  .emblem small{display:block;font-family:var(--body);font-size:10px;font-weight:800;opacity:.6}

  /* payout tray */
  .tray{margin-top:10px;height:22px;border:3px solid var(--ink);border-radius:8px;background:#0d0a12;
    box-shadow:inset 0 6px 10px rgba(0,0,0,.7)}
  /* little feet */
  .feet{position:absolute;bottom:-16px;left:22px;right:6px;height:16px;display:flex;justify-content:space-between}
  .feet i{width:34px;height:16px;background:var(--cab-dd);border:3px solid var(--ink);border-top:none;
    border-radius:0 0 8px 8px}

  /* ── the LEVER (right side) ── */
  .lever-wrap{position:absolute;top:104px;right:-46px;width:74px;height:230px;z-index:5;touch-action:none}
  .mount{position:absolute;right:20px;top:150px;width:34px;height:34px;border-radius:50%;
    background:radial-gradient(circle at 35% 32%,#4a4453,#221d2b);border:3px solid var(--ink);
    box-shadow:3px 3px 0 #000;z-index:2}
  .mount::after{content:"";position:absolute;inset:10px;border-radius:50%;background:#17131b;border:2px solid #000}
  .lever{position:absolute;right:33px;top:167px;width:14px;height:0;transform-origin:50% 100%;
    transform:rotate(-20deg);z-index:1;cursor:grab}
  .lever.grab{cursor:grabbing}
  .shaft{position:absolute;left:50%;bottom:0;transform:translateX(-50%);width:14px;height:118px;
    border-radius:8px;border:3px solid var(--ink);
    background:linear-gradient(90deg,#8f8c9c,var(--chrome) 40%,#6f6c7b);
    box-shadow:2px 2px 0 rgba(0,0,0,.4)}
  .shaft::after{content:"";position:absolute;left:3px;top:6px;width:3px;bottom:6px;border-radius:2px;
    background:rgba(255,255,255,.55)}
  .ball{position:absolute;left:50%;bottom:112px;transform:translateX(-50%);
    width:42px;height:42px;border-radius:50%;border:3px solid var(--ink);
    background:radial-gradient(circle at 34% 30%,#ff8f86,var(--red) 52%,#a8352d);
    box-shadow:3px 4px 0 #000}
  .ball::after{content:"";position:absolute;left:9px;top:7px;width:12px;height:8px;border-radius:50%;
    background:rgba(255,255,255,.7);transform:rotate(-18deg)}
  .lever.snap{transition:transform .5s cubic-bezier(.34,1.7,.5,1)}
  .lever.throw{transition:transform .16s ease-in}

  /* PULL! hint */
  .hint{position:absolute;right:-2px;top:96px;z-index:6;font-family:var(--disp);font-size:15px;
    color:var(--yellow);text-shadow:2px 2px 0 #000;animation:hb 1s ease-in-out infinite;pointer-events:none}
  .hint span{display:block;font-size:20px;text-align:center;line-height:.7}
  @keyframes hb{0%,100%{transform:translateY(0)}50%{transform:translateY(6px)}}
  .hidden{display:none!important}

  /* reveal toast */
  .toast{position:relative;margin-top:4px;min-height:30px;display:flex;align-items:center;
    justify-content:center;gap:9px;font-weight:800;font-size:13.5px;opacity:0;transition:opacity .25s}
  .toast.show{opacity:1}
  .toast .pop{border:3px solid var(--ink);border-radius:13px;background:var(--green);color:#17130f;
    padding:7px 14px;box-shadow:3px 3px 0 #000;transform:rotate(-1.5deg);display:flex;align-items:center;gap:8px;
    font-family:var(--disp);font-size:16px}
  .toast .mint{border:3px solid var(--ink);border-radius:11px;background:var(--yellow);color:#17130f;
    font-family:var(--disp);font-size:15px;padding:6px 13px;box-shadow:3px 3px 0 #000;cursor:pointer}
  .toast .mint:active{transform:translate(2px,2px);box-shadow:1px 1px 0 #000}

  .foot{font-size:12px;font-weight:700;opacity:.62;text-align:center;max-width:340px}
  .foot kbd{border:2px solid var(--ink);border-radius:6px;padding:0 6px;font-family:var(--body);
    font-size:11px;background:#241d30;box-shadow:1px 1px 0 #000}
</style>
</head>
<body>
  <div class="kick caps">Bull Stake · <b>The Bull Machine</b> · devnet</div>

  <div class="stage" id="stage">
    <div class="cab">
      <!-- mascot crest -->
      <svg class="crest" viewBox="0 0 78 70" aria-hidden="true">
        <path d="M14 66 C8 60 10 46 12 40 C12 30 16 22 26 19 C24 13 27 9 32 11 C36 13 35 18 33 23
                 C45 21 56 26 60 35 L67 41 C69 44 64 47 59 45 L49 45 C46 50 48 59 51 66 Z"
              fill="var(--tan)" stroke="var(--ink)" stroke-width="3" stroke-linejoin="round"/>
        <circle cx="43" cy="33" r="3" fill="#17130f"/>
      </svg>

      <div class="marquee"><span class="bulb"></span><b>BULL STAKE</b><span class="bulb b2"></span></div>

      <!-- reel window -->
      <div class="screen" id="screen">
        <div class="reels" id="reels">
          <div class="reel-col"><div class="reel" data-c="0"></div></div>
          <div class="reel-col"><div class="reel" data-c="1"></div></div>
          <div class="reel-col"><div class="reel" data-c="2"></div></div>
        </div>
        <div class="payline"></div>
        <div class="glare"></div>
      </div>

      <div class="readout">
        <div class="jack"><span class="lab caps">Jackpot</span><b id="jack">◎0.07</b></div>
        <div class="credits"><b id="cred">3</b><span class="caps">credits</span></div>
      </div>

      <div class="console">
        <div class="coinslot"></div>
        <div class="emblem">PULL TO SPIN<small>one bull per pull · minted to you</small></div>
      </div>

      <div class="tray"></div>
      <div class="feet"><i></i><i></i></div>
    </div>

    <!-- lever -->
    <div class="lever-wrap" id="leverWrap">
      <div class="mount"></div>
      <div class="lever snap" id="lever">
        <div class="shaft"></div>
        <div class="ball"></div>
      </div>
    </div>
    <div class="hint" id="hint">PULL<span>↓</span></div>
  </div>

  <div class="toast" id="toast"></div>

  <div class="foot">Drag the red ball <b>down</b> to pull &nbsp;·&nbsp; or click it &nbsp;·&nbsp; or press <kbd>Space</kbd></div>

<script>
/* ── slot symbols (bull-flavoured, bold ink) ───────────────────────── */
const C = { y:'#f5e33d', p:'#e59be0', r:'#e2564d', g:'#54d98c', t:'#cbb986', gold:'#f5c542', ink:'#17130f' };
const S = 'var(--ink)'; // stroke via CSS var resolves in inline svg
const SYM = [
  // horns
  `<svg viewBox="0 0 48 48"><path d="M24 30c-6 0-9-4-9-4M24 30c6 0 9-4 9-4" fill="none" stroke="${C.ink}" stroke-width="3"/><path d="M15 26c-6-2-9-9-8-15 5 2 9 7 9 13M33 26c6-2 9-9 8-15-5 2-9 7-9 13" fill="${C.t}" stroke="${C.ink}" stroke-width="3" stroke-linejoin="round"/><circle cx="24" cy="33" r="8" fill="${C.t}" stroke="${C.ink}" stroke-width="3"/><circle cx="21" cy="32" r="1.6" fill="${C.ink}"/><circle cx="27" cy="32" r="1.6" fill="${C.ink}"/></svg>`,
  // star
  `<svg viewBox="0 0 48 48"><path d="M24 5l5.5 12.5L43 19l-9.5 9 2.5 14L24 35 12 42l2.5-14L5 19l13.5-1.5z" fill="${C.y}" stroke="${C.ink}" stroke-width="3" stroke-linejoin="round"/></svg>`,
  // coin ◎
  `<svg viewBox="0 0 48 48"><circle cx="24" cy="24" r="18" fill="${C.gold}" stroke="${C.ink}" stroke-width="3"/><circle cx="24" cy="24" r="9" fill="none" stroke="${C.ink}" stroke-width="3"/><circle cx="24" cy="24" r="2.5" fill="${C.ink}"/></svg>`,
  // gem
  `<svg viewBox="0 0 48 48"><path d="M14 8h20l8 11-18 22L6 19z" fill="${C.g}" stroke="${C.ink}" stroke-width="3" stroke-linejoin="round"/><path d="M6 19h36M18 8l-4 11 10 22M30 8l4 11-10 22" fill="none" stroke="${C.ink}" stroke-width="2"/></svg>`,
  // seven
  `<svg viewBox="0 0 48 48"><path d="M13 12h22l-11 30" fill="none" stroke="${C.r}" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
  // bolt
  `<svg viewBox="0 0 48 48"><path d="M27 4L10 27h11l-4 17 20-25H26z" fill="${C.y}" stroke="${C.ink}" stroke-width="3" stroke-linejoin="round"/></svg>`,
  // gum bubble
  `<svg viewBox="0 0 48 48"><circle cx="26" cy="27" r="14" fill="${C.p}" stroke="${C.ink}" stroke-width="3"/><circle cx="21" cy="22" r="4" fill="rgba(255,255,255,.7)"/><path d="M12 20c-4-2-6-8-4-13" fill="none" stroke="${C.ink}" stroke-width="3" stroke-linecap="round"/></svg>`,
];
const NSYM = SYM.length;
const CELLH = 85, STRIP = 16, VISIBLE = 3; // land last 3 in the 3-row window
const rnd = (n)=>Math.floor(Math.random()*n);

const reels = [...document.querySelectorAll('.reel')];
const screen = document.getElementById('screen');
const toast = document.getElementById('toast');
const hint = document.getElementById('hint');
const credEl = document.getElementById('cred');
let credits = 3, spinning = false;

function fillIdle(reel){
  reel.innerHTML = Array.from({length:VISIBLE},()=>`<div class="cell">${SYM[rnd(NSYM)]}</div>`).join('');
  reel.style.transition='none'; reel.style.transform='translateY(0)';
}
reels.forEach(fillIdle);

function buildStrip(reel, targets){
  const cells=[];
  for(let i=0;i<STRIP-VISIBLE;i++) cells.push(rnd(NSYM));
  targets.forEach(t=>cells.push(t));
  reel.innerHTML = cells.map(s=>`<div class="cell">${SYM[s]}</div>`).join('');
  reel.style.transition='none';
  reel.style.transform='translateY(0)';
  void reel.offsetHeight; // reflow so the next transition animates
}

function doSpin(){
  if(spinning || credits<=0) return;
  spinning = true;
  credits--; credEl.textContent = credits;
  hint.classList.add('hidden');
  toast.classList.remove('show'); toast.innerHTML='';
  screen.classList.remove('win');

  const landing = -(STRIP-VISIBLE)*CELLH;
  reels.forEach((reel,ci)=>{
    buildStrip(reel, [rnd(NSYM),rnd(NSYM),rnd(NSYM)]);
    reel.classList.add('blur');
    reel.style.transition = `transform 1.35s cubic-bezier(.16,.85,.28,1) ${ci*0.19}s`;
    reel.style.transform = `translateY(${landing}px)`;
  });

  // per-column settle "clunk" as each reel lands (delay ci*190 + 1350 duration)
  reels.forEach((reel,ci)=> setTimeout(()=>{
    reel.classList.remove('blur');
    reel.animate([{transform:`translateY(${landing+7}px)`},{transform:`translateY(${landing}px)`}],
      {duration:150,easing:'ease-out'});
  }, 1350 + ci*190));
  // reveal once the LAST reel has settled — timed, not transitionend (which is
  // flaky with transition-delays + programmatic triggers across browsers)
  const settleAt = 1350 + (reels.length-1)*190 + 210;
  setTimeout(()=>{
    reels.forEach(r=>r.classList.remove('blur'));
    screen.classList.add('win');
    reveal();
    spinning = false;
    if(credits<=0) setTimeout(()=>{ credits=3; credEl.textContent=credits; }, 500); // demo: refill
  }, settleAt);
}

function reveal(){
  toast.innerHTML =
    `<div class="pop">★ Unique bull!</div><button class="mint" onclick="alert('(demo) → cash out mints this bull to your wallet')">Mint it →</button>`;
  toast.classList.add('show');
}

/* ── lever: drag DOWN to pull, click, or Space ── */
const lever = document.getElementById('lever');
const wrap = document.getElementById('leverWrap');
const UP = -20, DOWN = 46, THRESH = 26; // degrees
let dragging=false, startY=0, angle=UP;

function setAngle(a){ angle=a; lever.style.transform=`rotate(${a}deg)`; }

function throwLever(){
  lever.classList.remove('snap'); lever.classList.add('throw');
  setAngle(DOWN);
  setTimeout(()=>{                       // fire at the bottom of the throw
    doSpin();
    lever.classList.remove('throw'); lever.classList.add('snap');
    setAngle(UP);                        // springs back (bouncy cubic-bezier)
  }, 170);
}

lever.addEventListener('pointerdown',(e)=>{
  if(spinning) return;
  dragging=true; startY=e.clientY; lever.classList.remove('snap'); lever.classList.add('grab');
  lever.setPointerCapture(e.pointerId);
});
lever.addEventListener('pointermove',(e)=>{
  if(!dragging) return;
  const dy = e.clientY-startY;                       // px dragged down
  const a = Math.max(UP, Math.min(DOWN, UP + dy*0.42));
  setAngle(a);
});
function endDrag(e){
  if(!dragging) return;
  dragging=false; lever.classList.remove('grab');
  try{ lever.releasePointerCapture(e.pointerId); }catch{}
  if(angle >= THRESH){                                // pulled far enough → fire
    lever.classList.add('throw'); setAngle(DOWN);
    setTimeout(()=>{ doSpin(); lever.classList.remove('throw'); lever.classList.add('snap'); setAngle(UP); },140);
  } else {                                            // not far enough → spring back
    lever.classList.add('snap'); setAngle(UP);
  }
}
lever.addEventListener('pointerup', endDrag);
lever.addEventListener('pointercancel', endDrag);

// click the ball (not a real drag) → full pull
let downAt=0;
lever.addEventListener('pointerdown',()=>downAt=performance.now());
lever.addEventListener('click',()=>{ if(!spinning && performance.now()-downAt<250 && Math.abs(angle-UP)<3) throwLever(); });

addEventListener('keydown',(e)=>{ if(e.code==='Space'){ e.preventDefault(); if(!spinning) throwLever(); }});

setAngle(UP);
</script>
</body>
</html>
