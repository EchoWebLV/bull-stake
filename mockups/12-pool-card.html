<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Streak — Pool Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#07090d; --accent:#FF6A1A; --accent-2:#FFB23E; --gold:#FFD36B; --green:#3DE08A; --red:#FF3B3B;
    --text:#F4F6FA; --text-2:#9AA2B1; --text-3:#5C6473;
    --card:#11141b; --card-2:#181d27; --card-3:#1c222d;
    --b:rgba(255,255,255,.06); --b2:rgba(255,255,255,.09);
  }
  *{box-sizing:border-box;margin:0;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;}
  body{background:radial-gradient(130% 90% at 50% -10%,#1a1410,#0b0907 45%,#050608);min-height:100vh;
    display:flex;align-items:center;justify-content:center;padding:20px;font-family:'Inter',system-ui,sans-serif;color:var(--text);}
  .phone{position:relative;width:400px;min-height:880px;background:linear-gradient(180deg,#0c0a08,#080a0e);
    border:1px solid var(--b2);border-radius:42px;padding:18px 15px 20px;overflow:hidden;box-shadow:0 40px 120px rgba(0,0,0,.6);}
  .phone::before{content:"";position:absolute;top:-90px;left:50%;transform:translateX(-50%);width:460px;height:300px;
    background:var(--accent);opacity:.2;filter:blur(80px);border-radius:50%;pointer-events:none;}
  .phone>*{position:relative;z-index:1;}
  .tnum{font-variant-numeric:tabular-nums;}

  .top{display:flex;align-items:center;justify-content:space-between;}
  .brand{font-family:'Archivo';font-weight:800;font-size:22px;letter-spacing:-1px;}
  .brand b{color:var(--accent);}
  .ctrls{display:flex;gap:6px;align-items:center;}
  .cbtn{background:var(--card-3);border:1px solid var(--b2);color:var(--text);border-radius:9px;padding:6px 9px;
    font-size:11px;font-weight:700;cursor:pointer;font-family:'JetBrains Mono';}

  .pool{display:flex;align-items:center;justify-content:space-between;margin-top:12px;
    background:linear-gradient(180deg,#1c160d,#100c07);border:1px solid rgba(255,211,107,.22);border-radius:15px;padding:11px 14px;}
  .pool .l{font-size:9px;letter-spacing:1.4px;text-transform:uppercase;color:var(--text-3);font-weight:700;}
  .pool .pot{font-family:'Archivo';font-weight:800;font-size:26px;line-height:1;letter-spacing:-1px;margin-top:2px;
    background:linear-gradient(180deg,#FFE9B4,#FFC24C);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .pool .r{text-align:right;font-size:11px;color:var(--text-2);line-height:1.5;}
  .pool .r b{color:var(--text);}

  .match{display:flex;align-items:center;justify-content:space-between;margin-top:9px;
    background:linear-gradient(180deg,#151921,#0d1017);border:1px solid var(--b2);border-radius:15px;padding:10px 14px;}
  .side{display:flex;align-items:center;gap:8px;width:120px;}
  .side.away{justify-content:flex-end;}
  .crest{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-family:'Archivo';font-weight:800;font-size:9px;color:#fff;box-shadow:0 0 0 1px rgba(255,255,255,.15);}
  .cn{font-family:'Archivo';font-weight:700;font-size:12.5px;}
  .mid{text-align:center;}
  .sc{font-family:'Archivo';font-weight:800;font-size:24px;letter-spacing:1px;line-height:1;}
  .min{font-family:'JetBrains Mono';font-size:10px;margin-top:3px;font-weight:600;color:var(--red);display:inline-flex;align-items:center;gap:5px;justify-content:center;}
  .min.pre{color:var(--accent-2);}
  .blip{width:6px;height:6px;border-radius:50%;background:currentColor;animation:blip 1.3s infinite;}
  .min.paused .blip,.min.pre .blip{animation:none;}
  @keyframes blip{0%,100%{opacity:1;}50%{opacity:.3;}}

  .sec{font-size:10.5px;text-transform:uppercase;letter-spacing:.7px;color:var(--text-2);font-weight:700;margin:14px 4px 7px;
    display:flex;justify-content:space-between;align-items:center;}
  .sec .hit{color:var(--gold);font-family:'Archivo';font-size:13px;}

  /* prediction card */
  .cardbox{background:var(--card);border:1px solid var(--b);border-radius:14px;overflow:hidden;}
  .pr{padding:9px 12px;border-top:1px solid var(--b);}
  .pr:first-child{border-top:0;}
  .pr .q{font-size:11.5px;color:var(--text-2);font-weight:600;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center;}
  .pr .opts{display:flex;gap:6px;}
  .opt{flex:1;background:var(--card-2);border:1px solid var(--b2);border-radius:9px;padding:8px 4px;cursor:pointer;
    text-align:center;font-size:11.5px;font-weight:700;color:var(--text);transition:.1s;}
  .opt:active{transform:translateY(1px);}
  .opt.sel{border-color:var(--accent);background:rgba(255,106,26,.16);color:var(--accent-2);}
  /* live row */
  .pr.live{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .pr.live .q{margin:0;flex:1;color:var(--text);font-weight:600;font-size:12.5px;display:block;}
  .pr.live .q small{color:var(--text-3);font-weight:500;font-size:10.5px;}
  .pick{font-size:11px;font-weight:800;padding:4px 9px;border-radius:7px;background:var(--card-3);border:1px solid var(--b2);white-space:nowrap;}
  .stat{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;}
  .stat.hit{background:var(--green);color:#07120d;}
  .stat.miss{background:rgba(255,59,59,.16);color:var(--red);border:1px solid rgba(255,59,59,.4);}
  .stat.pending{background:transparent;border:1.5px dashed var(--text-3);color:var(--text-3);}

  .cta{margin-top:12px;width:100%;border:0;border-radius:13px;padding:15px;font-weight:800;font-size:15px;cursor:pointer;
    background:linear-gradient(180deg,#FF9244,#FF6A1A);color:#0a0a0a;font-family:'Inter';}
  .cta:disabled{background:var(--card-3);color:var(--text-3);cursor:default;}
  .auto{background:none;border:0;color:var(--text-3);font-size:11px;cursor:pointer;text-decoration:underline;display:block;margin:9px auto 0;}

  .feed{background:var(--card);border:1px solid var(--b);border-radius:13px;padding:5px 12px;max-height:88px;overflow:hidden;}
  .fe{display:flex;gap:8px;padding:5px 0;font-size:11.5px;border-top:1px solid var(--b);align-items:center;}
  .fe:first-child{border-top:0;}
  .fe .fm{font-family:'JetBrains Mono';font-size:10px;color:var(--text-3);width:24px;}
  .fe.big{color:var(--accent-2);font-weight:700;}

  .lb{background:var(--card);border:1px solid var(--b);border-radius:13px;padding:3px 12px;}
  .lbr{display:flex;align-items:center;gap:9px;padding:6px 0;font-size:12px;border-top:1px solid var(--b);}
  .lbr:first-child{border-top:0;}
  .lbr .r{width:15px;color:var(--text-3);font-family:'JetBrains Mono';font-size:11px;}
  .lbr .n{flex:1;font-weight:600;}
  .lbr.me{color:var(--accent);}
  .lbr.lead .r{color:var(--gold);}
  .lbr .s{font-weight:800;font-family:'JetBrains Mono';font-size:12px;}

  .over{position:absolute;inset:0;z-index:20;background:rgba(6,8,12,.93);backdrop-filter:blur(6px);
    display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px;}
  .over.show{display:flex;}
  .over .ttl{font-family:'Archivo';font-weight:800;font-size:22px;}
  .over .big{font-family:'Archivo';font-weight:800;font-size:50px;color:var(--gold);margin:4px 0;}
  .over .sub{color:var(--text-2);font-size:13px;line-height:1.7;}
  .over .sub b{color:var(--text);}
  .over .btn{margin-top:20px;background:linear-gradient(180deg,#FF9244,#FF6A1A);color:#0a0a0a;border:0;border-radius:13px;padding:14px 26px;font-weight:800;font-size:15px;cursor:pointer;}

  .hint{text-align:center;font-size:10.5px;color:var(--text-3);margin-top:11px;line-height:1.5;}
</style>
</head>
<body>
  <div class="phone">
    <div class="over" id="over">
      <div class="ttl" id="overTtl">Full time</div>
      <div class="big tnum" id="overBig">◎0.00</div>
      <div class="sub" id="overSub"></div>
      <button class="btn" id="again">New pool ▸</button>
    </div>

    <div class="top">
      <div class="brand">Strea<b>k</b></div>
      <div class="ctrls">
        <button class="cbtn" id="pp" style="display:none">⏸</button>
        <button class="cbtn" id="spd" style="display:none">1×</button>
        <button class="cbtn" id="nm">↻</button>
      </div>
    </div>

    <div class="pool">
      <div><div class="l">Prize pool</div><div class="pot tnum" id="pot">◎0.48</div></div>
      <div class="r"><div><b class="tnum" id="pcount">24</b> in the pool</div>
        <div>◎<b class="tnum">0.02</b> to enter</div>
        <div>most correct <b>wins it all</b></div></div>
    </div>

    <div class="match">
      <div class="side"><span class="crest" id="cH">ENG</span><span class="cn" id="nH">England</span></div>
      <div class="mid"><div class="sc tnum"><span id="scH">0</span>&nbsp;–&nbsp;<span id="scA">0</span></div>
        <div class="min pre" id="minWrap"><span class="blip"></span><span id="clock">pre-match</span></div></div>
      <div class="side away"><span class="cn" id="nA">Congo DR</span><span class="crest" id="cA">CGO</span></div>
    </div>

    <div class="sec"><span id="secL">Your card — pick all 8, then lock</span><span class="hit" id="secR"></span></div>
    <div class="cardbox" id="cardbox"></div>

    <button class="cta" id="cta" disabled>Pick all 8 to enter</button>
    <button class="auto" id="autofill">⚡ surprise me (auto-fill)</button>

    <div id="liveExtra" style="display:none">
      <div class="sec"><span>Live feed</span></div>
      <div class="feed" id="feed"></div>
      <div class="sec"><span>Pool standings</span><span id="poolN">24 players</span></div>
      <div class="lb" id="lb"></div>
    </div>

    <div class="hint" id="hint">Everyone locks a card before kick-off · picks freeze at 0' · no live betting, no front-running</div>
  </div>

<script>
(function(){
  const TEAMS=[
    {code:'ENG',name:'England',color:'#0b6bcb'},{code:'CGO',name:'Congo DR',color:'#c62b2b'},
    {code:'BRA',name:'Brazil',color:'#0a8f3c'},{code:'ARG',name:'Argentina',color:'#4aa3e0'},
    {code:'FRA',name:'France',color:'#20489b'},{code:'JPN',name:'Japan',color:'#b8112e'},
    {code:'MEX',name:'Mexico',color:'#0f7a34'},{code:'USA',name:'USA',color:'#1f3b8f'},
  ];
  const SPEEDS=[1,2,4]; let spdIdx=0;
  const BASE_MIN_MS=900, FEED_MAX=6;
  const ENTRY=0.02, POOL_SIZE=24, POT=+(ENTRY*POOL_SIZE).toFixed(2);
  const NAMES=['zk_marco','ana.sol','pel3','d_ronaldo','mbap','satoshi7','lena.sol','goalz','tiki_taka','var_check','onchain_ollie','degen_deb'];

  let HOME, AWAY, PREDS=[];
  let phase='fill', picks={}, players=[], M=null;
  let running=true, simAcc=0, lastTs=0;

  const $=id=>document.getElementById(id);
  const sol=n=>'◎'+(n<1?(+n.toFixed(3))+'':n.toFixed(2));

  function buildPreds(){
    PREDS=[
      {id:'result',q:'Full-time result',opts:[{k:'H',t:HOME.code},{k:'D',t:'Draw'},{k:'A',t:AWAY.code}],
        res:(p,ft)=>{if(!ft)return'pending';const r=M.scH>M.scA?'H':M.scH<M.scA?'A':'D';return p===r?'hit':'miss';}},
      {id:'ou',q:'Total goals',opts:[{k:'O',t:'Over 2.5'},{k:'U',t:'Under 2.5'}],
        res:(p,ft)=>{const g=M.scH+M.scA;if(g>=3)return p==='O'?'hit':'miss';if(ft)return p==='U'?'hit':'miss';return'pending';}},
      {id:'btts',q:'Both teams to score',opts:[{k:'Y',t:'Yes'},{k:'N',t:'No'}],
        res:(p,ft)=>{if(M.scH>0&&M.scA>0)return p==='Y'?'hit':'miss';if(ft)return p==='N'?'hit':'miss';return'pending';}},
      {id:'first',q:'First to score',opts:[{k:'H',t:HOME.code},{k:'A',t:AWAY.code},{k:'N',t:'None'}],
        res:(p,ft)=>{if(M.firstGoal)return p===M.firstGoal?'hit':'miss';if(ft)return p==='N'?'hit':'miss';return'pending';}},
      {id:'corners',q:'Total corners',opts:[{k:'O',t:'Over 9.5'},{k:'U',t:'Under 9.5'}],
        res:(p,ft)=>{const c=M.cornersH+M.cornersA;if(c>=10)return p==='O'?'hit':'miss';if(ft)return p==='U'?'hit':'miss';return'pending';}},
      {id:'cards',q:'Total bookings',opts:[{k:'O',t:'Over 3.5'},{k:'U',t:'Under 3.5'}],
        res:(p,ft)=>{const c=M.cardsH+M.cardsA;if(c>=4)return p==='O'?'hit':'miss';if(ft)return p==='U'?'hit':'miss';return'pending';}},
      {id:'red',q:'A red card',opts:[{k:'Y',t:'Yes'},{k:'N',t:'No'}],
        res:(p,ft)=>{if(M.reds>0)return p==='Y'?'hit':'miss';if(ft)return p==='N'?'hit':'miss';return'pending';}},
      {id:'half',q:'More goals in',opts:[{k:'1',t:'1st half'},{k:'2',t:'2nd half'},{k:'T',t:'Tie'}],
        res:(p,ft)=>{if(!ft)return'pending';const r=M.g1>M.g2?'1':M.g1<M.g2?'2':'T';return p===r?'hit':'miss';}},
    ];
  }
  const predLabel=(id,k)=>{const P=PREDS.find(p=>p.id===id);const o=P.opts.find(o=>o.k===k);return o?o.t:k;};

  function newPool(){
    const i=Math.floor(Math.random()*TEAMS.length);let j=Math.floor(Math.random()*TEAMS.length);while(j===i)j=Math.floor(Math.random()*TEAMS.length);
    HOME=TEAMS[i];AWAY=TEAMS[j];
    $('nH').textContent=HOME.name;$('cH').textContent=HOME.code;$('cH').style.background=HOME.color;
    $('nA').textContent=AWAY.name;$('cA').textContent=AWAY.code;$('cA').style.background=AWAY.color;
    buildPreds();
    phase='fill'; picks={}; players=[]; M=freshMatch(); simAcc=0; spdIdx=0;
    $('over').classList.remove('show');
    $('pp').style.display='none';$('spd').style.display='none';$('spd').textContent='1×';
    $('liveExtra').style.display='none';
    $('pot').textContent=sol(POT);$('pcount').textContent=POOL_SIZE;
    $('scH').textContent=0;$('scA').textContent=0;$('clock').textContent='pre-match';$('minWrap').className='min pre';
    $('secL').textContent='Your card — pick all 8, then lock';$('secR').textContent='';
    $('autofill').style.display='block';
    $('hint').textContent="Everyone locks a card before kick-off · picks freeze at 0' · no live betting, no front-running";
    renderCard();
  }
  function freshMatch(){return{min:0,scH:0,scA:0,cornersH:0,cornersA:0,cardsH:0,cardsA:0,reds:0,firstGoal:null,g1:0,g2:0,feed:[],over:false};}

  function pushFeed(min,txt,big){M.feed.unshift({min,txt,big});if(M.feed.length>FEED_MAX)M.feed.pop();}

  function advanceMinute(){
    M.min++;const r=Math.random;
    if(r()<0.035){const h=r()<0.52;if(h){M.scH++;pushFeed(M.min,`⚽ GOAL — ${HOME.name}! (${M.scH}-${M.scA})`,true);}else{M.scA++;pushFeed(M.min,`⚽ GOAL — ${AWAY.name}! (${M.scH}-${M.scA})`,true);}
      if(!M.firstGoal)M.firstGoal=h?'H':'A'; if(M.min<=45)M.g1++;else M.g2++;}
    if(r()<0.14){const h=r()<0.5;if(h)M.cornersH++;else M.cornersA++;pushFeed(M.min,`⛳ Corner — ${h?HOME.name:AWAY.name}`,false);}
    if(r()<0.055){const h=r()<0.5;if(r()<0.10){M.reds++;pushFeed(M.min,`🟥 RED CARD — ${h?HOME.name:AWAY.name}!`,true);}else{if(h)M.cardsH++;else M.cardsA++;pushFeed(M.min,`🟨 Booking — ${h?HOME.name:AWAY.name}`,false);}}
    if(M.min===45)pushFeed(45,'⏸ Half-time',false);
    if(M.min>=90&&!M.over)endMatch();
  }

  function hitsOf(card,ft){let n=0;for(const P of PREDS)if(P.res(card[P.id],ft)==='hit')n++;return n;}

  function lockIn(){
    // build the field
    players=[{name:'you',me:true,card:{...picks}}];
    for(let n=0;n<POOL_SIZE-1;n++){
      const card={};PREDS.forEach(P=>{card[P.id]=P.opts[Math.floor(Math.random()*P.opts.length)].k;});
      players.push({name:NAMES[n]||('player_'+(n+1)),me:false,card});
    }
    phase='live';M=freshMatch();simAcc=0;
    pushFeed('',`Kick-off — ${HOME.name} v ${AWAY.name}`,false);
    $('pp').style.display='inline-block';$('spd').style.display='inline-block';
    $('autofill').style.display='none';$('cta').style.display='none';
    $('liveExtra').style.display='block';
    $('minWrap').className='min';$('poolN').textContent=POOL_SIZE+' players';
    $('hint').textContent='Your card is locked · watch it resolve live · most correct at full-time takes the pot';
    render();
  }

  function endMatch(){
    M.over=true;phase='ft';
    const ranked=players.map(p=>({...p,hits:hitsOf(p.card,true)})).sort((a,b)=>b.hits-a.hits);
    const top=ranked[0].hits;const winners=ranked.filter(p=>p.hits===top);
    const share=POT/winners.length;
    const me=ranked.find(p=>p.me);const meRank=ranked.findIndex(p=>p.me)+1;
    const iWon=me.hits===top;
    $('over').classList.add('show');
    $('overTtl').textContent=iWon?(winners.length>1?'Split the pool!':'You won the pool! 🏆'):'Full time';
    $('overBig').textContent=iWon?sol(share):me.hits+'/8';
    $('overSub').innerHTML=iWon
      ? `You hit <b>${me.hits}/8</b> — top of ${POOL_SIZE}.<br>${winners.length>1?`Tied with ${winners.length-1} other${winners.length>2?'s':''} → split ${sol(POT)} → <b>${sol(share)}</b> each`:`Whole pot: <b>${sol(POT)}</b> (from ◎0.02 in)`}`
      : `You hit <b>${me.hits}/8</b> · finished <b>#${meRank}</b> of ${POOL_SIZE}.<br>Winner took <b>${top}/8</b> for ${sol(share)}.<br>So close — new pool?`;
    render();
  }

  function loop(ts){
    const dt=lastTs?ts-lastTs:0;lastTs=ts;
    if(phase==='live'&&running&&M&&!M.over){
      const minMs=BASE_MIN_MS/SPEEDS[spdIdx];simAcc+=dt;
      while(simAcc>=minMs){simAcc-=minMs;advanceMinute();if(M.over)break;}
      render();
    }
    requestAnimationFrame(loop);
  }

  function renderCard(){
    const ft=phase==='ft';
    if(phase==='fill'){
      $('cardbox').innerHTML=PREDS.map(P=>`<div class="pr"><div class="q">${P.q}</div><div class="opts">${
        P.opts.map(o=>`<div class="opt${picks[P.id]===o.k?' sel':''}" data-p="${P.id}" data-k="${o.k}">${o.t}</div>`).join('')
      }</div></div>`).join('');
      $('cardbox').querySelectorAll('.opt').forEach(b=>b.addEventListener('click',()=>{picks[b.dataset.p]=b.dataset.k;afterPick();}));
    }else{
      $('cardbox').innerHTML=PREDS.map(P=>{const st=P.res(picks[P.id],ft);
        return `<div class="pr live"><div class="q">${P.q} <small>· ${predLabel(P.id,picks[P.id])}</small></div>
          <div class="stat ${st}">${st==='hit'?'✓':st==='miss'?'✕':'·'}</div></div>`;}).join('');
    }
  }
  function afterPick(){
    renderCard();
    const n=Object.keys(picks).length;
    $('secL').textContent='Your card — pick all 8, then lock';
    const cta=$('cta');
    if(n>=PREDS.length){cta.disabled=false;cta.textContent=`Lock card & enter — ${sol(ENTRY)}`;}
    else{cta.disabled=true;cta.textContent=`Pick all ${PREDS.length} to enter (${n}/${PREDS.length})`;}
  }

  function render(){
    if(!M)return;
    $('scH').textContent=M.scH;$('scA').textContent=M.scA;
    $('clock').textContent=M.over?'FT':`${M.min}'`;
    $('minWrap').className='min'+((!running||M.over)?' paused':'');
    renderCard();
    const meHits=hitsOf(picks,M.over);
    $('secL').textContent='Your card';$('secR').textContent=meHits+'/8 ✓';
    $('feed').innerHTML=M.feed.map(f=>`<div class="fe${f.big?' big':''}"><span class="fm">${f.min?f.min+"'":''}</span><span>${f.txt}</span></div>`).join('');
    const ranked=players.map(p=>({...p,hits:hitsOf(p.card,M.over)})).sort((a,b)=>b.hits-a.hits);
    const top=ranked[0].hits;
    const meIdx=ranked.findIndex(p=>p.me);
    let show=ranked.slice(0,6);
    if(meIdx>=6)show=[...ranked.slice(0,5),ranked[meIdx]];
    $('lb').innerHTML=show.map((p)=>{const rank=ranked.indexOf(p)+1;
      return `<div class="lbr${p.me?' me':''}${p.hits===top?' lead':''}"><span class="r">${rank}</span><span class="n">${p.me?'you':p.name}</span><span class="s">${p.hits}/8</span></div>`;}).join('');
  }

  $('cta').addEventListener('click',lockIn);
  $('autofill').addEventListener('click',()=>{PREDS.forEach(P=>{if(!picks[P.id])picks[P.id]=P.opts[Math.floor(Math.random()*P.opts.length)].k;});afterPick();});
  $('pp').addEventListener('click',()=>{running=!running;$('pp').textContent=running?'⏸':'▶';});
  $('spd').addEventListener('click',()=>{spdIdx=(spdIdx+1)%SPEEDS.length;$('spd').textContent=SPEEDS[spdIdx]+'×';});
  $('nm').addEventListener('click',newPool);
  $('again').addEventListener('click',newPool);

  newPool();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
