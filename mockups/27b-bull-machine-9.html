<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bull Stake — 3D machine, 9 real traits (pull the lever)</title>
<!--
  Mockup 27b — the cabinet from 27, but the window is a 3×3 of the REAL bull
  trait tiles. Each cell is its own mini-reel of ONE trait category (Background,
  Body, Horns, Eyes, Mouth, … 9 total); a pull spins all nine, they cascade in
  column by column, and the 9 landed tiles ARE your bull — the reveal composes
  them (the actual layer PNGs) into the full portrait. Drag the ball down / click
  / Space. Loads the vendored art from bull/ (copied next to this file).
-->
<style>
  :root{
    --bg:#141019; --cab:#2b2334; --cab-d:#1d1727; --cab-dd:#151019;
    --ink:#f4ecd8; --yellow:#f5e33d; --pink:#e59be0; --red:#e2564d;
    --green:#54d98c; --tan:#cbb986; --gold:#f5c542; --chrome:#b9b7c4;
    --disp:"Marker Felt","Chalkboard SE","Comic Sans MS",system-ui,sans-serif;
    --body:ui-rounded,"SF Pro Rounded","Chalkboard SE",system-ui,-apple-system,sans-serif;
    --extrude:
      3px 3px 0 #000, 6px 7px 0 var(--cab-d), 9px 11px 0 var(--cab-d),
      12px 15px 0 var(--cab-dd), 15px 19px 0 var(--cab-dd), 17px 22px 0 #000;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:radial-gradient(1100px 620px at 50% -8%, #241a30 0%, transparent 60%),var(--bg);
    color:var(--ink);font-family:var(--body);-webkit-font-smoothing:antialiased;min-height:100%;
    display:flex;flex-direction:column;align-items:center;padding:22px 16px 40px;gap:14px;overflow-x:hidden}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.5;
    background:radial-gradient(rgba(244,236,216,.05) 1px,transparent 1.5px) 0 0/14px 14px}
  .caps{text-transform:uppercase;letter-spacing:.06em}
  .kick{font-size:12px;font-weight:800;opacity:.6}
  .kick b{color:var(--yellow)}

  .stage{position:relative;margin:6px 30px 10px 4px;z-index:1}
  .cab{position:relative;width:320px;border:3px solid var(--ink);border-radius:20px;
    background:linear-gradient(180deg,#312840,#241d30);box-shadow:var(--extrude);padding:15px 15px 17px}
  .cab::before{content:"";position:absolute;left:14px;right:6px;top:-9px;height:10px;
    border:3px solid var(--ink);border-bottom:none;border-radius:12px 12px 0 0;
    background:#3a2f4d;transform:skewX(-24deg);transform-origin:left bottom}
  .crest{position:absolute;top:-58px;left:50%;transform:translateX(-52%);width:78px;height:70px;z-index:3;
    filter:drop-shadow(3px 3px 0 #000)}
  .marquee{position:relative;display:flex;align-items:center;justify-content:center;gap:8px;
    border:3px solid var(--ink);border-radius:13px;background:var(--yellow);color:#17130f;
    padding:7px 10px 8px;box-shadow:3px 3px 0 #000;transform:rotate(-1.4deg);margin-bottom:11px}
  .marquee b{font-family:var(--disp);font-size:20px;line-height:1}
  .bulb{width:9px;height:9px;border-radius:50%;background:#fff;border:2px solid #17130f;
    box-shadow:0 0 8px 2px rgba(255,255,255,.7);animation:bulb 1.1s steps(1) infinite}
  .bulb.b2{animation-delay:.55s}
  @keyframes bulb{0%{background:#fff}50%{background:var(--red)}}

  .subcap{text-align:center;font-size:9.5px;font-weight:900;letter-spacing:.14em;opacity:.55;margin-bottom:7px}

  /* ── 3×3 real-tile window ── */
  .screen{position:relative;border:3px solid var(--ink);border-radius:13px;overflow:hidden;
    background:#0d0a12;box-shadow:inset 0 0 0 3px #000, inset 0 10px 22px rgba(0,0,0,.8);padding:8px}
  .grid{position:relative;display:grid;grid-template-columns:repeat(3,84px);grid-auto-rows:84px;
    gap:6px;justify-content:center}
  .tcell{position:relative;overflow:hidden;border-radius:9px;border:2px solid rgba(244,236,216,.22);
    background:#181121;box-shadow:inset 0 8px 12px -6px #000}
  .tstrip{position:absolute;top:0;left:0;right:0;will-change:transform}
  .tstrip.blur{filter:blur(1.1px)}
  .ttile{height:84px;display:flex;align-items:center;justify-content:center}
  .ttile img{width:84px;height:84px;object-fit:cover;display:block;image-rendering:auto}
  .grid.win .tcell{border-color:var(--green);box-shadow:inset 0 8px 12px -6px #000,0 0 9px rgba(84,217,140,.5)}
  .glare{position:absolute;inset:8px;border-radius:9px;pointer-events:none;
    background:linear-gradient(122deg,rgba(255,255,255,.12),transparent 44%);mix-blend-mode:screen}

  .readout{display:flex;align-items:center;gap:9px;margin-top:12px}
  .jack{flex:1;border:3px solid var(--ink);border-radius:11px;background:#0d0a12;color:var(--gold);
    box-shadow:inset 0 0 0 2px #000;padding:6px 11px;display:flex;align-items:baseline;gap:7px}
  .jack .lab{font-size:9px;font-weight:900;letter-spacing:.12em;opacity:.7;color:var(--ink)}
  .jack b{font-family:var(--disp);font-size:22px;line-height:.9;margin-left:auto;text-shadow:0 0 10px rgba(245,197,66,.6)}
  .credits{border:3px solid var(--ink);border-radius:11px;background:var(--pink);color:#17130f;
    box-shadow:3px 3px 0 #000;padding:6px 11px;text-align:center}
  .credits b{font-family:var(--disp);font-size:19px;display:block;line-height:.95}
  .credits span{font-size:8px;font-weight:900;letter-spacing:.1em}

  .console{margin-top:11px;border:3px solid var(--ink);border-radius:12px;background:#241d30;
    box-shadow:inset 0 3px 10px rgba(0,0,0,.5);padding:9px 11px;display:flex;align-items:center;gap:10px}
  .coinslot{width:34px;height:34px;border:3px solid var(--ink);border-radius:8px;background:#0d0a12;
    display:flex;align-items:center;justify-content:center;flex:none;box-shadow:inset 0 0 0 2px #000}
  .coinslot::after{content:"";width:15px;height:4px;background:var(--ink);border-radius:2px}
  .emblem{font-family:var(--disp);font-size:15px;line-height:1.05}
  .emblem small{display:block;font-family:var(--body);font-size:10px;font-weight:800;opacity:.6}
  .tray{margin-top:10px;height:22px;border:3px solid var(--ink);border-radius:8px;background:#0d0a12;
    box-shadow:inset 0 6px 10px rgba(0,0,0,.7)}
  .feet{position:absolute;bottom:-16px;left:22px;right:6px;height:16px;display:flex;justify-content:space-between}
  .feet i{width:34px;height:16px;background:var(--cab-dd);border:3px solid var(--ink);border-top:none;border-radius:0 0 8px 8px}

  /* lever */
  .mount{position:absolute;right:20px;top:158px;width:34px;height:34px;border-radius:50%;
    background:radial-gradient(circle at 35% 32%,#4a4453,#221d2b);border:3px solid var(--ink);box-shadow:3px 3px 0 #000;z-index:2}
  .mount::after{content:"";position:absolute;inset:10px;border-radius:50%;background:#17131b;border:2px solid #000}
  .lever{position:absolute;right:33px;top:175px;width:14px;height:0;transform-origin:50% 100%;transform:rotate(-20deg);z-index:1;cursor:grab;touch-action:none}
  .lever.grab{cursor:grabbing}
  .shaft{position:absolute;left:50%;bottom:0;transform:translateX(-50%);width:14px;height:118px;border-radius:8px;
    border:3px solid var(--ink);background:linear-gradient(90deg,#8f8c9c,var(--chrome) 40%,#6f6c7b);box-shadow:2px 2px 0 rgba(0,0,0,.4)}
  .shaft::after{content:"";position:absolute;left:3px;top:6px;width:3px;bottom:6px;border-radius:2px;background:rgba(255,255,255,.55)}
  .ball{position:absolute;left:50%;bottom:112px;transform:translateX(-50%);width:42px;height:42px;border-radius:50%;
    border:3px solid var(--ink);background:radial-gradient(circle at 34% 30%,#ff8f86,var(--red) 52%,#a8352d);box-shadow:3px 4px 0 #000}
  .ball::after{content:"";position:absolute;left:9px;top:7px;width:12px;height:8px;border-radius:50%;background:rgba(255,255,255,.7);transform:rotate(-18deg)}
  .lever.snap{transition:transform .5s cubic-bezier(.34,1.7,.5,1)}
  .lever.throw{transition:transform .16s ease-in}
  .hint{position:absolute;right:-2px;top:104px;z-index:6;font-family:var(--disp);font-size:15px;color:var(--yellow);
    text-shadow:2px 2px 0 #000;animation:hb 1s ease-in-out infinite;pointer-events:none}
  .hint span{display:block;font-size:20px;text-align:center;line-height:.7}
  @keyframes hb{0%,100%{transform:translateY(0)}50%{transform:translateY(6px)}}
  .hidden{display:none!important}

  /* reveal: composed bull portrait */
  .toast{margin-top:2px;min-height:34px;display:flex;align-items:center;justify-content:center;gap:12px;opacity:0;transition:opacity .28s}
  .toast.show{opacity:1}
  .portrait{width:74px;height:74px;border-radius:12px;border:3px solid var(--ink);box-shadow:3px 3px 0 #000;object-fit:cover;
    animation:pop .4s cubic-bezier(.3,1.6,.5,1)}
  @keyframes pop{0%{transform:scale(.3) rotate(-12deg);opacity:0}100%{transform:none;opacity:1}}
  .toast .txt{font-family:var(--disp);font-size:16px;line-height:1.1}
  .toast .txt small{display:block;font-family:var(--body);font-size:11px;font-weight:800;opacity:.6}
  .toast .mint{border:3px solid var(--ink);border-radius:11px;background:var(--yellow);color:#17130f;
    font-family:var(--disp);font-size:15px;padding:7px 13px;box-shadow:3px 3px 0 #000;cursor:pointer}
  .toast .mint:active{transform:translate(2px,2px);box-shadow:1px 1px 0 #000}

  .foot{font-size:12px;font-weight:700;opacity:.62;text-align:center;max-width:340px}
  .foot kbd{border:2px solid var(--ink);border-radius:6px;padding:0 6px;font-size:11px;background:#241d30;box-shadow:1px 1px 0 #000}
</style>
</head>
<body>
  <div class="kick caps">Bull Stake · <b>The Bull Machine</b> · 9 real traits</div>

  <div class="stage" id="stage">
    <div class="cab">
      <svg class="crest" viewBox="0 0 78 70" aria-hidden="true">
        <path d="M14 66 C8 60 10 46 12 40 C12 30 16 22 26 19 C24 13 27 9 32 11 C36 13 35 18 33 23
                 C45 21 56 26 60 35 L67 41 C69 44 64 47 59 45 L49 45 C46 50 48 59 51 66 Z"
              fill="var(--tan)" stroke="var(--ink)" stroke-width="3" stroke-linejoin="round"/>
        <circle cx="43" cy="33" r="3" fill="#17130f"/>
      </svg>
      <div class="marquee"><span class="bulb"></span><b>BULL STAKE</b><span class="bulb b2"></span></div>
      <div class="subcap caps">9 traits · one pull builds your bull</div>

      <div class="screen">
        <div class="grid" id="grid"></div>
        <div class="glare"></div>
      </div>

      <div class="readout">
        <div class="jack"><span class="lab caps">Jackpot</span><b>◎0.07</b></div>
        <div class="credits"><b id="cred">3</b><span class="caps">credits</span></div>
      </div>
      <div class="console">
        <div class="coinslot"></div>
        <div class="emblem">PULL TO SPIN<small>all nine traits · minted to you</small></div>
      </div>
      <div class="tray"></div>
      <div class="feet"><i></i><i></i></div>
    </div>

    <div class="mount"></div>
    <div class="lever snap" id="lever"><div class="shaft"></div><div class="ball"></div></div>
    <div class="hint" id="hint">PULL<span>↓</span></div>
  </div>

  <div class="toast" id="toast"></div>
  <div class="foot">Drag the red ball <b>down</b> &nbsp;·&nbsp; or click it &nbsp;·&nbsp; or press <kbd>Space</kbd></div>

<script>
const CELL = 84, STRIP = 13, VISIBLE_LAST = STRIP - 1;
const rnd = (n)=>Math.floor(Math.random()*n);
const grid = document.getElementById('grid');
const credEl = document.getElementById('cred');
const toast = document.getElementById('toast');
const hint = document.getElementById('hint');
let manifest = null, cells = [], credits = 3, spinning = false;

const tileSrc = (ci, ti)=> 'bull/' + manifest[ci].traits[ti].tile;
const layerSrc = (ci, ti)=> 'bull/' + manifest[ci].traits[ti].layer;
const loadImg = (src)=> new Promise((res,rej)=>{ const i=new Image(); i.onload=()=>res(i); i.onerror=()=>rej(src); i.src=src; });

async function boot(){
  manifest = await fetch('bull/manifest.json').then(r=>r.json());
  // one cell per category (0..8) → 3×3
  for(let ci=0; ci<9; ci++){
    const cell = document.createElement('div'); cell.className='tcell';
    const strip = document.createElement('div'); strip.className='tstrip';
    cell.appendChild(strip); grid.appendChild(cell);
    cells.push(strip);
    idleCell(ci);
  }
}
function tileHTML(ci, ti){ return `<div class="ttile"><img src="${tileSrc(ci,ti)}" alt=""></div>`; }
function idleCell(ci){
  const strip = cells[ci];
  strip.innerHTML = tileHTML(ci, rnd(manifest[ci].traits.length));
  strip.style.transition='none'; strip.style.transform='translateY(0)';
}

function doSpin(){
  if(spinning || !manifest || credits<=0) return;
  spinning = true;
  credits--; credEl.textContent = credits;
  hint.classList.add('hidden');
  toast.classList.remove('show'); toast.innerHTML='';
  grid.classList.remove('win');

  const targets = new Array(9);
  const landing = -VISIBLE_LAST * CELL;
  for(let ci=0; ci<9; ci++){
    const n = manifest[ci].traits.length;
    const target = rnd(n);
    targets[ci] = target;
    const strip = cells[ci];
    let html='';
    for(let k=0;k<STRIP-1;k++) html += tileHTML(ci, rnd(n));
    html += tileHTML(ci, target);
    strip.innerHTML = html;
    strip.classList.add('blur');
    strip.style.transition='none'; strip.style.transform='translateY(0)';
    void strip.offsetHeight;                       // reflow so the next change animates
    const col = ci % 3;                            // cascade left→right by column
    strip.style.transition = `transform 1.3s cubic-bezier(.16,.85,.28,1) ${col*0.18}s`;
    strip.style.transform = `translateY(${landing}px)`;
    // settle clunk as this column lands
    setTimeout(()=>{
      strip.classList.remove('blur');
      strip.animate([{transform:`translateY(${landing+7}px)`},{transform:`translateY(${landing}px)`}],{duration:150,easing:'ease-out'});
    }, 1300 + col*180);
  }

  const settleAt = 1300 + 2*180 + 200;             // last column done + buffer
  setTimeout(async ()=>{
    cells.forEach(s=>s.classList.remove('blur'));
    grid.classList.add('win');
    await reveal(targets);
    spinning = false;
    if(credits<=0) setTimeout(()=>{ credits=3; credEl.textContent=credits; }, 500);
  }, settleAt);
}

async function reveal(targets){
  // compose the 9 landed traits into the full bull (the real layer PNGs)
  let url = '';
  try{
    const imgs = await Promise.all(manifest.map((_,ci)=>loadImg(layerSrc(ci, targets[ci]))));
    const c = document.createElement('canvas'); c.width=c.height=512;
    const ctx = c.getContext('2d');
    for(const img of imgs) ctx.drawImage(img,0,0,512,512);
    url = c.toDataURL('image/png');
  }catch(e){ /* a tile failed to load — still celebrate */ }
  toast.innerHTML =
    (url ? `<img class="portrait" src="${url}" alt="Your bull">` : '') +
    `<div class="txt">Your bull!<small>9 traits · 1-of-1</small></div>` +
    `<button class="mint" onclick="alert('(demo) → cash out mints THIS bull to your wallet')">Mint it →</button>`;
  toast.classList.add('show');
}

/* lever: drag down / click / Space (same feel as mockup 27) */
const lever = document.getElementById('lever');
const UP=-20, DOWN=46, THRESH=26;
let dragging=false, startY=0, angle=UP, downAt=0;
const setAngle=(a)=>{ angle=a; lever.style.transform=`rotate(${a}deg)`; };
function throwLever(){
  if(spinning) return;
  lever.classList.remove('snap'); lever.classList.add('throw'); setAngle(DOWN);
  setTimeout(()=>{ doSpin(); lever.classList.remove('throw'); lever.classList.add('snap'); setAngle(UP); }, 170);
}
lever.addEventListener('pointerdown',(e)=>{ if(spinning) return; dragging=true; startY=e.clientY; downAt=performance.now();
  lever.classList.remove('snap'); lever.classList.add('grab'); lever.setPointerCapture(e.pointerId); });
lever.addEventListener('pointermove',(e)=>{ if(!dragging) return;
  setAngle(Math.max(UP, Math.min(DOWN, UP + (e.clientY-startY)*0.42))); });
function endDrag(e){ if(!dragging) return; dragging=false; lever.classList.remove('grab');
  try{ lever.releasePointerCapture(e.pointerId); }catch{}
  if(angle>=THRESH){ lever.classList.add('throw'); setAngle(DOWN);
    setTimeout(()=>{ doSpin(); lever.classList.remove('throw'); lever.classList.add('snap'); setAngle(UP); },140); }
  else { lever.classList.add('snap'); setAngle(UP); } }
lever.addEventListener('pointerup', endDrag);
lever.addEventListener('pointercancel', endDrag);
lever.addEventListener('click',()=>{ if(!spinning && performance.now()-downAt<250 && Math.abs(angle-UP)<3) throwLever(); });
addEventListener('keydown',(e)=>{ if(e.code==='Space'){ e.preventDefault(); throwLever(); }});
setAngle(UP);

boot();
</script>
</body>
</html>
